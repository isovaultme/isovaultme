<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro ROMs Vault - V0.4</title>
    <style>
        body { background-color: #060b0e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00d4ff; }
        .games-grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: auto; 
        }
        .game-card { 
            background: #1a1a1a; 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            transition: transform 0.3s, border 0.3s;
            border: 1px solid #333;
        }
        .game-card:hover { transform: scale(1.05); border-color: #00d4ff; }
        .card-image-container img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 8px; 
        }
        .game-info h3 { font-size: 1.1em; margin: 10px 0 5px; }
        .game-info p { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <h1>Minha Coleção PS2 (V0.4)</h1>
    <div id="mainGrid" class="games-grid-layout"></div>

    <script src="gamesps2.js"></script>
    <script src="main.js"></script>
    
</body>
</html>
